name: Validate CloudFormation and Lambda logic

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install cfn-lint
        run: pip install cfn-lint
      - name: Lint CloudFormation templates
        # Fail the build on errors only; warnings are reported but non-blocking.
        run: cfn-lint --non-zero-exit-code error stacks/*.yaml

  lambda-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run grading logic regression tests
        # Zero dependencies - uses Node's built-in test runner, matching the
        # rest of the project's zero-npm-dependency approach.
        run: node --test lambda/shared/*.test.mjs
