AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UK Clearing Advisor - CDN + storage stack. Private S3 static site (OAC),
  exports bucket, CloudFront distribution with GB geo-restriction, WAF
  association, and an /api/* origin to the HTTP API.

Parameters:
  WebACLArn:
    Type: String
    Description: us-east-1 CLOUDFRONT-scope WAF WebACL ARN.
  ApiDomain:
    Type: String
    Description: HTTP API host only (no scheme/path), e.g. xxxx.execute-api.eu-west-2.amazonaws.com
  ApiOriginSecret:
    Type: String
    NoEcho: true
    Default: change-me
    Description: >
      Shared secret CloudFront sends to the API origin as X-Origin-Verify.
      Each Lambda behind the API checks this and rejects direct execute-api
      calls that skip CloudFront/WAF (geo-block, edge rate limiting). Must
      match the ApiOriginSecret used in the compute stack.

Resources:

  StaticSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'uk-clearing-advisor-site-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]

  ExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'uk-clearing-advisor-exports-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      # DECISION: S3 lifecycle granularity is whole days; the spec's 2-hour
      # deletion is enforced by the (deferred) export flow + 1h presigned URL.
      LifecycleConfiguration:
        Rules:
          - Id: expire-exports
            Status: Enabled
            ExpirationInDays: 1

  # Forwards CloudFront viewer geo/device headers to the API origin (but not
  # Host, so API Gateway still receives its own hostname). Enables the Grafana
  # geomap/device panels which read these from the SearchCourses logs.
  ApiGeoOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: clearing-advisor-api-geo
        HeadersConfig:
          HeaderBehavior: whitelist
          # CloudFront allows at most 10 headers in an origin request policy.
          Headers:
            - content-type
            - user-agent
            - cloudfront-viewer-country
            - cloudfront-viewer-country-region-name
            - cloudfront-viewer-city
            - cloudfront-viewer-latitude
            - cloudfront-viewer-longitude
            - cloudfront-is-mobile-viewer
            - cloudfront-is-tablet-viewer
            - cloudfront-is-desktop-viewer
        CookiesConfig: { CookieBehavior: none }
        QueryStringsConfig: { QueryStringBehavior: all }

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: clearing-advisor-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Strips the leading /api before forwarding to the HTTP API origin
  # (API routes are /search, /subjects, ... with no /api prefix).
  ApiRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: clearing-advisor-api-rewrite
      AutoPublish: true
      FunctionConfig:
        Comment: Strip /api prefix for the API origin.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          if (request.uri.startsWith('/api/')) {
            request.uri = request.uri.substring(4);
          } else if (request.uri === '/api') {
            request.uri = '/';
          }
          return request;
        }

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: UK Clearing Advisor
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        WebACLId: !Ref WebACLArn
        Restrictions:
          GeoRestriction:
            RestrictionType: whitelist
            Locations: [GB]
        Origins:
          - Id: s3-static
            DomainName: !GetAtt StaticSiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: api-origin
            DomainName: !Ref ApiDomain
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
            # Lets each Lambda behind the API reject direct execute-api calls
            # that skip CloudFront/WAF (same pattern as the Grafana origin).
            # A custom origin header, not a forwarded viewer header, so it
            # does not count against the origin request policy's 10-header cap.
            OriginCustomHeaders:
              - HeaderName: X-Origin-Verify
                HeaderValue: !Ref ApiOriginSecret
        DefaultCacheBehavior:
          TargetOriginId: s3-static
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api-origin
            ViewerProtocolPolicy: https-only
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: !Ref ApiGeoOriginRequestPolicy
            Compress: true
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ApiRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 403
            ResponsePagePath: /geo-blocked.html
            ErrorCachingMinTTL: 10
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  StaticSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticSiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal: { Service: cloudfront.amazonaws.com }
            Action: s3:GetObject
            Resource: !Sub '${StaticSiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

Outputs:
  StaticSiteBucketName:
    Value: !Ref StaticSiteBucket
    Export: { Name: !Sub '${AWS::StackName}-StaticSiteBucketName' }
  ExportsBucketName:
    Value: !Ref ExportsBucket
    Export: { Name: !Sub '${AWS::StackName}-ExportsBucketName' }
  DistributionId:
    Value: !Ref Distribution
    Export: { Name: !Sub '${AWS::StackName}-DistributionId' }
  CloudFrontDomainName:
    Value: !GetAtt Distribution.DomainName
    Export: { Name: !Sub '${AWS::StackName}-CloudFrontDomainName' }
