AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UK Clearing Advisor - Grafana front door. CloudFront + WAF so Grafana is
  reachable from anywhere in the UK (geo=GB) OR from a specific allowed IP,
  with a trusted CloudFront certificate (removes the self-signed warning).
  MUST be deployed in us-east-1 (WAF CLOUDFRONT scope).

Parameters:
  OriginHost:
    Type: String
    Default: REPLACE_GRAFANA_EIP.nip.io
    Description: Grafana EC2 origin hostname (served over HTTP:80, secret-gated).
  AllowIp:
    Type: String
    Default: REPLACE_ALLOWED_CIDR
    Description: Non-UK IP also allowed through (in addition to all GB).
  OriginSecret:
    Type: String
    NoEcho: true
    Description: Shared secret CloudFront sends to the origin (X-Origin-Verify).

Resources:

  AllowedIpSet:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: grafana-allowed-ips
      Scope: CLOUDFRONT
      IPAddressVersion: IPV4
      Addresses: [!Ref AllowIp]

  WebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: grafana-webacl
      Scope: CLOUDFRONT
      DefaultAction:
        Block: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: grafana-webacl
      Rules:
        - Name: AllowGB
          Priority: 1
          Action: { Allow: {} }
          Statement:
            GeoMatchStatement:
              CountryCodes: [GB]
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AllowGB
        - Name: AllowIp
          Priority: 2
          Action: { Allow: {} }
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt AllowedIpSet.Arn
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AllowIp

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Grafana front door (UK + allowed IP)
        HttpVersion: http2
        PriceClass: PriceClass_100
        WebACLId: !GetAtt WebACL.Arn
        Origins:
          - Id: grafana-origin
            DomainName: !Ref OriginHost
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              OriginSSLProtocols: [TLSv1.2]
            OriginCustomHeaders:
              - HeaderName: X-Origin-Verify
                HeaderValue: !Ref OriginSecret
        DefaultCacheBehavior:
          TargetOriginId: grafana-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  CloudFrontDomain:
    Value: !GetAtt Distribution.DomainName
  DistributionId:
    Value: !Ref Distribution
