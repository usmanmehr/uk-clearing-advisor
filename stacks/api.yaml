AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UK Clearing Advisor - API stack. HTTP API (payload v2.0), Lambda proxy
  integrations, CORS, throttling and access logging.

Parameters:
  Environment: { Type: String, Default: production }
  ComputeStackName: { Type: String, Default: uk-clearing-advisor-compute }
  AllowOrigin:
    Type: String
    Default: 'https://REPLACE_APP_CLOUDFRONT_DOMAIN'
    Description: >
      CORS allowed origin. Must be the CloudFront domain
      (https://xxxx.cloudfront.net) from the cdn stack, not '*' - the API is
      also reachable directly via its execute-api URL, so a permissive CORS
      value would let any website call /search cross-origin.
  ThrottleBurst: { Type: Number, Default: 100 }
  ThrottleRate: { Type: Number, Default: 50 }

Resources:

  AccessLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/apigateway/clearing-advisor-access
      RetentionInDays: 7

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: clearing-advisor-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: [!Ref AllowOrigin]
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [content-type, x-turnstile-token]
        MaxAge: 3600

  # ---- Integrations ----
  SearchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-SearchCoursesAliasArn'

  SubjectsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetSubjectsArn'

  UniversitiesIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetUniversitiesArn'

  ScholarshipsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetScholarshipsArn'

  ExportIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-GenerateExportArn'

  HealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      PayloadFormatVersion: '2.0'
      IntegrationUri:
        Fn::ImportValue: !Sub '${ComputeStackName}-HealthArn'

  # ---- Routes ----
  SearchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /search'
      Target: !Sub 'integrations/${SearchIntegration}'
  SubjectsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /subjects'
      Target: !Sub 'integrations/${SubjectsIntegration}'
  UniversitiesRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /universities'
      Target: !Sub 'integrations/${UniversitiesIntegration}'
  ScholarshipsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /scholarships'
      Target: !Sub 'integrations/${ScholarshipsIntegration}'
  ExportRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /export'
      Target: !Sub 'integrations/${ExportIntegration}'
  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /health'
      Target: !Sub 'integrations/${HealthIntegration}'

  # ---- Stage ($default, auto-deploy) ----
  DefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      DefaultRouteSettings:
        ThrottlingBurstLimit: !Ref ThrottleBurst
        ThrottlingRateLimit: !Ref ThrottleRate
      AccessLogSettings:
        DestinationArn: !GetAtt AccessLogGroup.Arn
        Format: >-
          {"requestId":"$context.requestId","ip":"$context.identity.sourceIp","method":"$context.httpMethod","route":"$context.routeKey","status":"$context.status","protocol":"$context.protocol","responseLength":"$context.responseLength","latencyMs":"$context.responseLatency"}

  # ---- Lambda invoke permissions ----
  SearchPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-SearchCoursesAliasArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'
  SubjectsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetSubjectsArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'
  UniversitiesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetUniversitiesArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'
  ScholarshipsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-GetScholarshipsArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'
  ExportPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-GenerateExportArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'
  HealthPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Fn::ImportValue: !Sub '${ComputeStackName}-HealthArn'
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*'

Outputs:
  ApiEndpoint:
    Value: !GetAtt HttpApi.ApiEndpoint
    Export: { Name: !Sub '${AWS::StackName}-ApiEndpoint' }
  ApiId:
    Value: !Ref HttpApi
    Export: { Name: !Sub '${AWS::StackName}-ApiId' }
