AWSTemplateFormatVersion: '2010-09-09'
Description: >
  UK Clearing Advisor - Observability stack. SNS alerts, CloudWatch log metric
  filters, alarms and an operations dashboard. Alarms map to metrics actually
  emitted by SearchCourses and to AWS/Lambda service metrics.

Parameters:
  AdminEmail:
    Type: String
    Default: your-email@example.com
    Description: Email subscribed to the alerts topic (must be confirmed).
  SearchFunctionName:
    Type: String
    Default: ClearingAdvisor-SearchCourses
  SearchLogGroup:
    Type: String
    Default: /aws/lambda/ClearingAdvisor-SearchCourses
  Namespace:
    Type: String
    Default: ClearingAdvisor

Resources:

  AlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ClearingAdvisorAlerts
      DisplayName: Clearing Advisor Alerts

  AlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref AlertsTopic
      Protocol: email
      Endpoint: !Ref AdminEmail

  # ---- Log metric filters (structured JSON logs) ----
  ErrorCountFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref SearchLogGroup
      FilterName: SearchErrorCount
      FilterPattern: '{ $.level = "ERROR" }'
      MetricTransformations:
        - MetricNamespace: !Ref Namespace
          MetricName: LambdaLoggedErrorCount
          MetricValue: '1'
          DefaultValue: 0

  SlowSearchFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref SearchLogGroup
      FilterName: SlowSearchCount
      FilterPattern: '{ $.totalLatencyMs > 2000 }'
      MetricTransformations:
        - MetricNamespace: !Ref Namespace
          MetricName: SlowSearchCount
          MetricValue: '1'
          DefaultValue: 0

  # ---- Alarms ----
  LambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-LambdaErrors
      AlarmDescription: 'WARNING: SearchCourses Lambda errors elevated.'
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions: [{ Name: FunctionName, Value: !Ref SearchFunctionName }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  LambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-LambdaThrottles
      AlarmDescription: 'WARNING: SearchCourses being throttled.'
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions: [{ Name: FunctionName, Value: !Ref SearchFunctionName }]
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  SlowSearchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-SlowSearch
      AlarmDescription: 'WARNING: searches slower than 2s are frequent.'
      Namespace: !Ref Namespace
      MetricName: SlowSearchCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 50
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  RateLimitSurgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-RateLimitSurge
      AlarmDescription: 'WARNING: high volume of rate-limited requests.'
      Namespace: !Ref Namespace
      MetricName: RateLimitedCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 200
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  HoneypotSpikeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-HoneypotSpike
      AlarmDescription: 'WARNING: honeypot triggered frequently (bot activity).'
      Namespace: !Ref Namespace
      MetricName: HoneypotTriggered
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  ZeroResultsSpikeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-ZeroResultsSpike
      AlarmDescription: 'WARNING: many searches returning zero results.'
      Namespace: !Ref Namespace
      MetricName: ZeroResultsCount
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  SearchDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-SearchDurationP99
      AlarmDescription: >-
        WARNING: SearchCourses p99 execution duration is elevated - a real
        speed regression (e.g. DynamoDB scan slowing down as the dataset
        grows) would show here before it shows up as a count of individual
        slow requests. Complements SlowSearchAlarm (which counts requests
        over 2s) by watching the raw AWS/Lambda Duration metric directly.
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions: [{ Name: FunctionName, Value: !Ref SearchFunctionName }]
      ExtendedStatistic: p99
      Period: 300
      EvaluationPeriods: 2
      Threshold: 3000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]
      OKActions: [!Ref AlertsTopic]

  ResultsDayConcurrencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: ClearingAdvisor-Concurrency
      AlarmDescription: 'CRITICAL: Lambda concurrent executions very high.'
      Namespace: AWS/Lambda
      MetricName: ConcurrentExecutions
      Dimensions: [{ Name: FunctionName, Value: !Ref SearchFunctionName }]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref AlertsTopic]

  OperationsDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClearingAdvisor-Operations
      DashboardBody: !Sub |
        {
          "widgets": [
            { "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": { "title": "Searches per minute", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["${Namespace}", "SearchCount"]] } },
            { "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": { "title": "Search latency p95 (ms)", "region": "${AWS::Region}",
                "period": 300,
                "metrics": [["${Namespace}", "TotalSearchLatencyMs", { "stat": "p95" }],
                            ["${Namespace}", "TotalSearchLatencyMs", { "stat": "p50" }]] } },
            { "type": "metric", "x": 0, "y": 6, "width": 8, "height": 6,
              "properties": { "title": "Results returned (avg)", "region": "${AWS::Region}",
                "stat": "Average", "period": 300,
                "metrics": [["${Namespace}", "ResultsReturned"]] } },
            { "type": "metric", "x": 8, "y": 6, "width": 8, "height": 6,
              "properties": { "title": "Security", "region": "${AWS::Region}", "stat": "Sum", "period": 3600,
                "metrics": [["${Namespace}", "RateLimitedCount"],
                            ["${Namespace}", "HoneypotTriggered"],
                            ["${Namespace}", "ZeroResultsCount"]] } },
            { "type": "metric", "x": 16, "y": 6, "width": 8, "height": 6,
              "properties": { "title": "Lambda health", "region": "${AWS::Region}", "stat": "Sum", "period": 300,
                "metrics": [["AWS/Lambda", "Errors", "FunctionName", "${SearchFunctionName}"],
                            ["AWS/Lambda", "Throttles", "FunctionName", "${SearchFunctionName}"],
                            ["AWS/Lambda", "Invocations", "FunctionName", "${SearchFunctionName}"]] } },
            { "type": "metric", "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": { "title": "Concurrent executions", "region": "${AWS::Region}", "stat": "Maximum", "period": 60,
                "metrics": [["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "${SearchFunctionName}"]] } }
          ]
        }

  ResultsDayDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: ClearingAdvisor-ResultsDay
      DashboardBody: !Sub |
        {
          "start": "-PT6H",
          "widgets": [
            { "type": "metric", "x": 0, "y": 0, "width": 6, "height": 6,
              "properties": { "title": "Searches / min", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60, "view": "timeSeries",
                "metrics": [["${Namespace}", "SearchCount"]] } },
            { "type": "metric", "x": 6, "y": 0, "width": 6, "height": 6,
              "properties": { "title": "Search latency p95 (ms)", "region": "${AWS::Region}",
                "period": 60,
                "metrics": [["${Namespace}", "TotalSearchLatencyMs", { "stat": "p95" }]] } },
            { "type": "metric", "x": 12, "y": 0, "width": 6, "height": 6,
              "properties": { "title": "Cache hits vs misses", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["${Namespace}", "CacheHit"], ["${Namespace}", "CacheMiss"]] } },
            { "type": "metric", "x": 18, "y": 0, "width": 6, "height": 6,
              "properties": { "title": "Estimated data served", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["${Namespace}", "EstimatedDataServed"]] } },
            { "type": "metric", "x": 0, "y": 6, "width": 6, "height": 6,
              "properties": { "title": "Rate limited", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["${Namespace}", "RateLimitedCount"]] } },
            { "type": "metric", "x": 6, "y": 6, "width": 6, "height": 6,
              "properties": { "title": "Honeypot triggered", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["${Namespace}", "HoneypotTriggered"]] } },
            { "type": "metric", "x": 12, "y": 6, "width": 6, "height": 6,
              "properties": { "title": "Concurrent executions", "region": "${AWS::Region}",
                "stat": "Maximum", "period": 60,
                "metrics": [["AWS/Lambda", "ConcurrentExecutions", "FunctionName", "${SearchFunctionName}"]] } },
            { "type": "metric", "x": 18, "y": 6, "width": 6, "height": 6,
              "properties": { "title": "Lambda errors", "region": "${AWS::Region}",
                "stat": "Sum", "period": 60,
                "metrics": [["AWS/Lambda", "Errors", "FunctionName", "${SearchFunctionName}"]] } },
            { "type": "alarm", "x": 0, "y": 12, "width": 24, "height": 4,
              "properties": { "title": "Active alarms",
                "alarms": [
                  "${LambdaErrorsAlarm.Arn}", "${LambdaThrottlesAlarm.Arn}",
                  "${SlowSearchAlarm.Arn}", "${SearchDurationAlarm.Arn}",
                  "${RateLimitSurgeAlarm.Arn}",
                  "${HoneypotSpikeAlarm.Arn}", "${ZeroResultsSpikeAlarm.Arn}",
                  "${ResultsDayConcurrencyAlarm.Arn}"
                ] } }
          ]
        }

Outputs:
  AlertsTopicArn:
    Value: !Ref AlertsTopic
    Export: { Name: !Sub '${AWS::StackName}-AlertsTopicArn' }
  OperationsDashboard:
    Value: ClearingAdvisor-Operations
  ResultsDayDashboard:
    Value: ClearingAdvisor-ResultsDay
